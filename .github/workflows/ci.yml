name: CI

on:
  push:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: denoland/setup-deno@v2
      with:
        deno-version: 2.2.15
    - uses: supabase/setup-cli@v1
      id: setup-supabase
      with:
        version: latest
    - name: Cache Docker images
      uses: ScribeMD/docker-cache@0.5.0
      with:
        key: docker-supabase-${{ runner.os }}-${{ steps.setup-supabase.outputs.version }}
    - name: Start Supabase
      run: supabase start
    - name: Setup environment
      run: supabase status -o env > supabase/functions/.env.test
    - name: Install dependencies
      working-directory: ./supabase/functions
      run: deno install
    - name: Run tests
      working-directory: ./supabase/functions
      run: deno test --allow-all
